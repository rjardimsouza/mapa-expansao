<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Expansão - ARCA Church</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>🌿 MAPA DE EXPANSÃO</h1>
                <p>ARCA CHURCH</p>
            </div>
            <div class="resume-panel">
                <h3>RESUMO GERAL</h3>
                <div class="resume-item" id="resume-content">
                    <!-- Preenchido por JavaScript -->
                </div>
            </div>
        </header>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-color" style="background-color: #1e3a5f;"></span>
                <span>Igreja</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #6ba14f;"></span>
                <span>Supervisão</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #f4d35e;"></span>
                <span>Célula</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #d4a5d9;"></span>
                <span>Nova Célula</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #cccccc;"></span>
                <span>Inativa</span>
            </div>
        </div>

        <div class="hierarchy-container" id="hierarchyContainer">
            <!-- Preenchido por JavaScript -->
        </div>

        <footer class="footer">
            <p>Este mapa mostra o fluxo de multiplicação da ARCA CHURCH. Cada linha representa uma geração.</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
