<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Expansão - ARCA Church</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>🌿 MAPA DE EXPANSÃO</h1>
                <p>ARCA CHURCH</p>
            </div>
            <div class="resume-panel">
                <h3>RESUMO GERAL</h3>
                <div class="resume-item" id="resume-content">
                    <div class="resume-stat">
                        <span>⏳</span>
                        <span>Carregando dados...</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-color" style="background-color: #1e3a5f;"></span>
                <span>Igreja</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #6ba14f;"></span>
                <span>Supervisão</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #f4d35e;"></span>
                <span>Célula</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #d4a5d9;"></span>
                <span>Nova Célula</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background-color: #cccccc;"></span>
                <span>Inativa</span>
            </div>
        </div>

        <div class="legend legend-status">
            <div class="legend-item">
                <span class="legend-icon">👍</span>
                <span>≥ 6 meses</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">⚠️</span>
                <span>3-6 meses</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🔴</span>
                <span>0-3 meses</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🔵</span>
                <span>Vencido</span>
            </div>
        </div>

        <div class="hierarchy-container" id="hierarchyContainer">
            <div style="text-align: center; padding: 40px; color: #999;">
                <p>⏳ Carregando dados...</p>
            </div>
        </div>

        <footer class="footer">
            <p>📊 Mapa de Hierarquia da ARCA Church | Dados carregados de: <code>data.json</code></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
